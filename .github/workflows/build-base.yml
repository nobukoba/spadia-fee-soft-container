name: build-base-hul-alma9

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nobukoba/spadia-fee-soft-container

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local image for test
        run: docker build -t spadia-fee-soft-container:test .

      - name: Run smoke test
        run: docker run --rm spadia-fee-soft-container:test /usr/local/bin/hul-smoke-test.sh
	