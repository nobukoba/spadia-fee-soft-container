name: build-apptainer-sif

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag to create/update (optional)"
        required: false
        default: ""

jobs:
  build-sif:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Show Apptainer version
        run: apptainer --version

      - name: Build SIF from GHCR image
        env:
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apptainer build spadia-fee-soft-container.sif docker://ghcr.io/nobukoba/spadia-fee-soft-container:latest

      - name: Upload SIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: spadia-fee-soft-container-sif
          path: spadia-fee-soft-container.sif

      - name: Create or update GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: spadia-fee-soft-container.sif
          generate_release_notes: true
